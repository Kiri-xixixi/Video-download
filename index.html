<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Downloader Aldi 😹</title>
  <style>
    body {
      background: #0f0f0f;
      color: white;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .box {
      background: #1a1a1a;
      padding: 30px;
      border-radius: 20px;
      width: 350px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      text-align: center;
    }
    input {
      width: 100%;
      padding: 12px;
      border: 2px solid #2a2a2a;
      border-radius: 10px;
      margin-top: 10px;
      background: #2a2a2a;
      color: white;
      box-sizing: border-box;
      outline: none;
    }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      margin-top: 15px;
      cursor: pointer;
      font-weight: bold;
      background: #ffffff;
      color: #000;
    }
    .footer { margin-top: 20px; font-size: 12px; color: #555; }
  </style>
</head>
<body>

<div class="box">
  <h2>Video Downloader 😹</h2>
  <p style="font-size: 13px; color: #888;">Paste direct link (.mp4) di bawah</p>
  <input type="text" id="url" placeholder="https://example.com/video.mp4">
  <button onclick="downloadVideo()">Gas Download!</button>
  <div class="footer">Made with emosi by Doni 🥀</div>
</div>

<script>
function downloadVideo() {
  const videoUrl = document.getElementById("url").value;

  if (!videoUrl) {
    alert("URL kosong goblog 😹");
    return;
  }

  // Bikin elemen anchor sementara
  const link = document.createElement('a');
  link.href = videoUrl;
  
  // Paksa buka di tab baru biar gak nge-refresh web lu sendiri
  link.target = '_blank'; 
  
  // Atribut download (cuma jalan kalo satu domain atau servernya ijinin)
  link.setAttribute('download', 'video_donlotan.mp4');
  
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}
</script>

</body>
</html>
