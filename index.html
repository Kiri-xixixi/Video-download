<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Downloader Aldi 😹</title>
  <style>
    body {
      background: #0f0f0f;
      color: white;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .box {
      background: #1a1a1a;
      padding: 30px;
      border-radius: 20px;
      width: 350px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      text-align: center;
    }
    input {
      width: 100%;
      padding: 12px;
      border: 2px solid #2a2a2a;
      border-radius: 10px;
      margin-top: 10px;
      background: #2a2a2a;
      color: white;
      box-sizing: border-box;
      outline: none;
    }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      margin-top: 15px;
      cursor: pointer;
      font-weight: bold;
      background: #ffffff;
      color: #000;
      transition: 0.2s;
    }
    button:disabled {
      background: #555;
      color: #aaa;
      cursor: not-allowed;
    }
    .footer { margin-top: 20px; font-size: 12px; color: #555; }
    #status { margin-top: 10px; font-size: 13px; color: #ffeb3b; }
  </style>
</head>
<body>

<div class="box">
  <h2>Video Downloader 😹</h2>
  <p style="font-size: 13px; color: #888;">Paste link TikTok / X (Twitter) di bawah</p>
  <input type="text" id="url" placeholder="https://vt.tiktok.com/... atau https://x.com/...">
  <button id="btn" onclick="downloadVideo()">Gas Download!</button>
  <div id="status"></div>
  <div class="footer">Made with emosi by Doni 🥀</div>
</div>

<script>
async function downloadVideo() {
  const videoUrl = document.getElementById("url").value;
  const btn = document.getElementById("btn");
  const status = document.getElementById("status");

  if (!videoUrl) {
    alert("URL kosong goblog 😹");
    return;
  }

  btn.disabled = true;
  btn.innerText = "Sabar, lagi proses...";
  status.innerText = "Menghubungkan ke server logistik...";

  try {
    if (videoUrl.includes("tiktok.com")) {
      status.innerText = "Mengambil data video TikTok...";
      
      // Menggunakan API TikWM jalur fetch data
      const res = await fetch(`https://api.tikwm.com/api/?url=${encodeURIComponent(videoUrl)}`);
      const json = await res.json();
      
      if (json.code === 0 && json.data.play) {
        status.innerText = "Mengunduh file video langsung...";
        
        // Tembak URL video mentahnya, ubah jadi blob biar langsung ke-download
        const videoRes = await fetch(json.data.play);
        const blob = await videoRes.blob();
        
        // Bikin link samaran buat trigger download otomatis di browser
        const downloadLink = document.createElement("a");
        downloadLink.href = URL.createObjectURL(blob);
        downloadLink.download = `tiktok_${json.data.id || 'video'}.mp4`;
        
        document.body.appendChild(downloadLink);
        downloadLink.click();
        document.body.removeChild(downloadLink);
        
        status.innerText = "Download sukses langsung ke lokal! 😹";
      } else {
        throw new Error("Gagal dapet video mentah");
      }
    } 
    else if (videoUrl.includes("x.com") || videoUrl.includes("twitter.com")) {
      status.innerText = "X/Twitter terdeteksi. Mengalihkan ke Twitsave...";
      // Buat X, sementara emang paling aman dilempar ke pihak ketiga karena enkripsi Elon ketat
      window.open(`https://twitsave.com/download?url=${encodeURIComponent(videoUrl)}`, '_blank');
      status.innerText = "Silahkan cek tab Twitsave buat download.";
    } else {
      alert("Cuma bisa TikTok ama X doang ya King MikroTik! 🫩");
    }
  } catch (e) {
    console.error(e);
    status.innerText = "API utama turu / diblokir CORS browser. 😭";
    alert("Gagal total Di, API-nya lagi pingsan!");
  } finally {
    btn.disabled = false;
    btn.innerText = "Gas Download!";
  }
}
</script>
