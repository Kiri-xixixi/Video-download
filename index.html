<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Downloader Aldi 😹</title>
  <style>
    body {
      background: #0f0f0f;
      color: white;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .box {
      background: #1a1a1a;
      padding: 30px;
      border-radius: 20px;
      width: 350px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      text-align: center;
    }
    input {
      width: 100%;
      padding: 12px;
      border: 2px solid #2a2a2a;
      border-radius: 10px;
      margin-top: 10px;
      background: #2a2a2a;
      color: white;
      box-sizing: border-box;
      outline: none;
    }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      margin-top: 15px;
      cursor: pointer;
      font-weight: bold;
      background: #ffffff;
      color: #000;
      transition: 0.2s;
    }
    button:disabled {
      background: #555;
      color: #aaa;
      cursor: not-allowed;
    }
    .footer { margin-top: 20px; font-size: 12px; color: #555; }
    #status { margin-top: 10px; font-size: 13px; color: #ffeb3b; }
  </style>
</head>
<body>

<div class="box">
  <h2>Video Downloader 😹</h2>
  <p style="font-size: 13px; color: #888;">Paste link TikTok / X (Twitter) di bawah</p>
  <input type="text" id="url" placeholder="https://vt.tiktok.com/... atau https://x.com/...">
  <button id="btn" onclick="downloadVideo()">Gas Download!</button>
  <div id="status"></div>
  <div class="footer">Made with emosi by Doni 🥀</div>
</div>

<script>
// Variabel global untuk menyimpan URL saat ini
let currentVideoUrl = "";

async function downloadVideo() {
  let videoUrl = document.getElementById("url").value.trim();
  const btn = document.getElementById("btn");
  const btnBackup = document.getElementById("btn-backup");
  const status = document.getElementById("status");

  if (!videoUrl) {
    alert("URL kosong goblog 😹");
    return;
  }

  currentVideoUrl = videoUrl;

  btnBackup.style.display = "none";
  btn.disabled = true;
  btn.innerText = "Sabar, lagi diproses...";

  const isTikTok = videoUrl.includes("tiktok.com");
  const isTwitter = videoUrl.includes("x.com") || videoUrl.includes("twitter.com");

  // --- JALUR TIKTOK (TIKWM) ---
  if (isTikTok) {
    status.innerText = "Membuka Jalur Utama (TikWM)...";
    
    // FIX: Udah gua pasang backtick, tanda $, ama parameter api-nya, Di!
    const tikwmDownloadUrl = `https://www.tikwm.com/api/download.php?url=${encodeURIComponent(videoUrl)}&loop=1`;
    window.open(tikwmDownloadUrl, '_blank');
    
    status.innerText = "Membuka tab download TikWM! 😹";
    
    setTimeout(() => {
      btnBackup.style.display = "inline-block";
      status.innerText = "Membuka tab download TikWM! Jika gagal/blank, klik tombol cadangan di atas.";
    }, 3000);

    resetButton();
    return;
  } 
  
  // --- JALUR X / TWITTER ---
  else if (isTwitter) {
    status.innerText = "Membuka Jalur Twitter (Twitsave)...";
    // FIX: Udah dipasang parameter twitsave-nya yang bener
    window.open(`https://twitsave.com/download?url=${encodeURIComponent(videoUrl)}`, '_blank');
    status.innerText = "Silahkan cek tab baru";
    resetButton();
    return;
  } 
  
  else {
    alert("Link apaan nih? Cuma bisa TikTok atau X/Twitter doang ya! 😤");
    resetButton();
  }
}

// --- 2. FUNGSI JALUR CADANGAN TIKTOK ---
function downloadBackup() {
  const status = document.getElementById("status");
  status.innerText = "Mencoba API Cadangan (Snaptik Open)...";
  
  try {
    // FIX: Udah dibenerin string literals-nya
    const backupUrl = `https://api.tikverse.workers.dev/download?url=${encodeURIComponent(currentVideoUrl)}`;
    window.open(backupUrl, '_blank');
    status.innerText = "Membuka link download cadangan... 🫩";
  } catch (err) {
    alert("Semua API lagi turu masal, lu download manual aja lah Di! 😭");
    status.innerText = "Gagal total.";
  }
}

function resetButton() {
  const btn = document.getElementById("btn");
  btn.disabled = false;
  btn.innerText = "Gas Download!";
}
</script>
