<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Downloader Aldi 😹</title>
  <style>
    body {
      background: #0f0f0f;
      color: white;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .box {
      background: #1a1a1a;
      padding: 30px;
      border-radius: 20px;
      width: 350px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      text-align: center;
    }
    input {
      width: 100%;
      padding: 12px;
      border: 2px solid #2a2a2a;
      border-radius: 10px;
      margin-top: 10px;
      background: #2a2a2a;
      color: white;
      box-sizing: border-box;
      outline: none;
    }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      margin-top: 15px;
      cursor: pointer;
      font-weight: bold;
      background: #ffffff;
      color: #000;
      transition: 0.2s;
    }
    button:disabled {
      background: #555;
      color: #aaa;
      cursor: not-allowed;
    }
    .footer { margin-top: 20px; font-size: 12px; color: #555; }
    #status { margin-top: 10px; font-size: 13px; color: #ffeb3b; }
  </style>
</head>
<body>

<div class="box">
  <h2>Video Downloader 😹</h2>
  <p style="font-size: 13px; color: #888;">Paste link TikTok / X (Twitter) di bawah</p>
  <input type="text" id="url" placeholder="https://vt.tiktok.com/... atau https://x.com/...">
  <button id="btn" onclick="downloadVideo()">Gas Download!</button>
  <div id="status"></div>
  <div class="footer">Made with emosi by Doni 🥀</div>
</div>

<script>
async function downloadVideo() {
  const videoUrl = document.getElementById("url").value;
  const btn = document.getElementById("btn");
  const status = document.getElementById("status");

  if (!videoUrl) {
    alert("URL kosong goblog 😹");
    return;
  }

  // Efek Loading biar keren
  btn.disabled = true;
  btn.innerText = "Sabar, lagi diproses...";
  status.innerText = "Mengambil data video dari server...";

  try {
    // Kita pake API TikWM buat TikTok & Twitter (X) universal
    // Note: API publik gratisan kadang bisa ganti/down, tapi ini yang paling stabil sekarang
    let apiUrl = `https://api.tikwm.com/api/`;
    let response;
    
    if (videoUrl.includes("tiktok.com")) {
      response = await fetch(`${apiUrl}?url=${encodeURIComponent(videoUrl)}`);
      const data = await response.json();
      
      if (data.code === 0 && data.data.play) {
        // Pake trik fetch blob biar beneran ke-download ke storage, bukan cuma buka tab
        forceDownload(data.data.play, "tiktok_aldi.mp4");
        status.innerText = "Download sukses! 😹";
      } else {
        throw new Error("Gagal dapet video TikTok");
      }
    } 
    else if (videoUrl.includes("x.com") || videoUrl.includes("twitter.com")) {
      // Untuk Twitter kita tembak API pihak ketiga yang open
      response = await fetch(`https://twitsave.com/info?url=${encodeURIComponent(videoUrl)}`);
      // Karena twitsave balikin HTML, kodingannya agak panjang. 
      // Opsi simpel tanpa pusing backend: oper langsung ke tab baru khusus link downloadnya
      alert("Untuk X/Twitter, link mentah bakal dibuka di tab baru, tinggal klik kanan -> save video as.");
      window.open(`https://twitsave.com/download?url=${encodeURIComponent(videoUrl)}`, '_blank');
      status.innerText = "Silahkan download di tab baru";
    } 
    else {
      alert("Cuma bisa TikTok ama X doang ya joki NASA! 🫩");
      status.innerText = "";
    }

  } catch (error) {
    console.error(error);
    alert("Gagal download, sepuh API-nya lagi turu atau link lu busuk 😭");
    status.innerText = "Error terjadi.";
  } finally {
    btn.disabled = false;
    btn.innerText = "Gas Download!";
  }
}

// Function helper buat paksa browser nge-download file biner (Blob)
async function forceDownload(url, filename) {
  const res = await fetch(url);
  const blob = await res.blob();
  const blobUrl = window.URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = blobUrl;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  window.URL.revokeObjectURL(blobUrl);
}
</script>

</body>
</html>
