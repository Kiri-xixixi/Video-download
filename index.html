<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Downloader 😹</title>

  <style>
    body{
      background:#0f0f0f;
      color:white;
      font-family:Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
    }

    .box{
      background:#1a1a1a;
      padding:30px;
      border-radius:20px;
      width:350px;
    }

    input{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      margin-top:10px;
      background:#2a2a2a;
      color:white;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      margin-top:15px;
      cursor:pointer;
      font-weight:bold;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Video Downloader 😹</h2>

  <input
    type="text"
    id="url"
    placeholder="Masukin direct video URL"
  >

  <button onclick="downloadVideo()">
    Download
  </button>
</div>

<script>
function downloadVideo(){
  const url = document.getElementById("url").value;

  if(!url){
    alert("URL kosong goblog 😹");
    return;
  }

  const a = document.createElement("a");
  a.href = url;
  a.download = "video";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}
</script>

</body>
</html>
