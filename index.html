<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Downloader Aldi 😹</title>
  <style>
    body {
      background: #0f0f0f;
      color: white;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .box {
      background: #1a1a1a;
      padding: 30px;
      border-radius: 20px;
      width: 350px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      text-align: center;
    }
    input {
      width: 100%;
      padding: 12px;
      border: 2px solid #2a2a2a;
      border-radius: 10px;
      margin-top: 10px;
      background: #2a2a2a;
      color: white;
      box-sizing: border-box;
      outline: none;
    }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      margin-top: 15px;
      cursor: pointer;
      font-weight: bold;
      background: #ffffff;
      color: #000;
      transition: 0.2s;
    }
    button:disabled {
      background: #555;
      color: #aaa;
      cursor: not-allowed;
    }
    .footer { margin-top: 20px; font-size: 12px; color: #555; }
    #status { margin-top: 10px; font-size: 13px; color: #ffeb3b; }
  </style>
</head>
<body>

<div class="box">
  <h2>Video Downloader 😹</h2>
  <p style="font-size: 13px; color: #888;">Paste link TikTok / X (Twitter) di bawah</p>
  <input type="text" id="url" placeholder="https://vt.tiktok.com/... atau https://x.com/...">
  <button id="btn" onclick="downloadVideo()">Gas Download!</button>
  <div id="status"></div>
  <div class="footer">Made with emosi by Doni 🥀</div>
</div>

<script>
async function downloadVideo() {
  const videoUrl = document.getElementById("url").value;
  const btn = document.getElementById("btn");
  const status = document.getElementById("status");

  if (!videoUrl) {
    alert("URL kosong goblog 😹");
    return;
  }

  btn.disabled = true;
  btn.innerText = "Sabar, lagi diproses...";
  status.innerText = "Nge-hack server TikTok/X dulu...";

  try {
    // Kita pake API dari Loreserve / Tikwm versi simpel yang langsung balikin data siap pakai
    if (videoUrl.includes("tiktok.com")) {
      const res = await fetch(`https://api.tikwm.com/api/?url=${encodeURIComponent(videoUrl)}`);
      const json = await res.data || await res.json();
      
      if (json.code === 0 && json.data.play) {
        // Trik jitu: Kita lempar url video mentah ke service proxy download biar browser langsung nge-save
        // Ini buat nge-bypass proteksi CORS browser lu
        const downloadProxy = `https://worker.j0.dev/download?url=${encodeURIComponent(json.data.play)}&name=tiktok_aldi.mp4`;
        
        // Buka lewat window.location biar langsung ke-trigger download di browser tanpa ngebuka tab baru kosong
        window.location.href = json.data.play; 
        
        // Kalo cara di atas di device lu tetep muter videonya doang, pake alternatif link di bawah ini (hilangkan tanda komparasi):
        // window.open(`https://www.tikwm.com/api/download.php?url=${encodeURIComponent(videoUrl)}&loop=1`, '_blank');

        status.innerText = "Download sukses! 😹";
      } else {
        throw new Error();
      }
    } 
    else if (videoUrl.includes("x.com") || videoUrl.includes("twitter.com")) {
      alert("Buat X/Twitter, lu bakal dioper ke web download kosongan, tinggal klik tombol download di sana ya Di.");
      window.open(`https://twitsave.com/download?url=${encodeURIComponent(videoUrl)}`, '_blank');
      status.innerText = "Silahkan cek tab baru";
    } 
    else {
      alert("Cuma bisa TikTok ama X doang! 🫩");
    }
  } catch (error) {
    // Kalo API utama ngadat, kita pake fallback API Tikwm official download endpoint
    if (videoUrl.includes("tiktok.com")) {
      status.innerText = "Pake jalur alternatif... Bentar.";
      window.open(`https://www.tikwm.com/api/download.php?url=${encodeURIComponent(videoUrl)}`, '_blank');
    } else {
      alert("Gagal total Di, server-nya lagi turu 😭");
    }
  } finally {
    btn.disabled = false;
    btn.innerText = "Gas Download!";
  }
}
</script>
